<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSwift - E-Commerce</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="bg-gradient text-white py-5 text-center">
    <h1>Welcome to ShopSwift</h1>
    <p>Your one-stop shop for tech gadgets!</p>
  </header>

  <main class="container py-4">
    <div class="row mb-4">
      <div class="col-md-4">
        <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
      </div>
      <div class="col-md-4">
        <select id="sortSelect" class="form-select">
          <option value="">Sort by</option>
          <option value="low">Price: Low to High</option>
          <option value="high">Price: High to Low</option>
        </select>
      </div>
      <div class="col-md-4">
        <select id="priceFilter" class="form-select">
          <option value="">Filter by Price</option>
          <option value="under1000">Under ₹1000</option>
          <option value="1000to2000">₹1000 to ₹2000</option>
          <option value="above2000">Above ₹2000</option>
        </select>
      </div>
    </div>

    <div id="productList" class="row"></div>
  </main>

  <footer class="bg-dark text-white text-center py-3">
    <p>&copy; 2025 ShopSwift. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

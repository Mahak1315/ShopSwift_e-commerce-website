<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini E-Commerce</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-white" href="#">E-Shop</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link text-white" href="#">Cart <span class="badge bg-light text-dark cart-count">0</span></a>
        </li>
      </ul>
    </div>
  </nav>

  <header class="hero-header position-relative text-center">
  <div class="overlay"></div>
  <div class="position-relative text-white py-5">
    <h1 class="display-5 fw-bold">Welcome to E-Shop</h1>
    <p class="lead">Find your best products at the best price.</p>
  </div>
</header>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="filter-buttons">
        <button class="btn btn-outline-primary btn-sm filter-btn active" onclick="filterProducts('all')">All</button>
        <button class="btn btn-outline-primary btn-sm filter-btn" onclick="filterProducts('Electronics')">Electronics</button>
        <button class="btn btn-outline-primary btn-sm filter-btn" onclick="filterProducts('Clothing')">Clothing</button>
        <button class="btn btn-outline-primary btn-sm filter-btn" onclick="filterProducts('Books')">Books</button>
      </div>
      <select class="form-select w-auto" onchange="sortProducts(this.value)">
        <option selected disabled>Sort by Price</option>
        <option value="asc">Low to High</option>
        <option value="desc">High to Low</option>
      </select>
    </div>

    <div class="row" id="product-list"></div>

    <section class="cart-section mt-5">
      <h4>Shopping Cart</h4>
      <div id="cart-items" class="mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <strong>Total: ₹<span id="cart-total">0</span></strong>
        <button class="btn btn-success">Checkout</button>
      </div>
    </section>
  </main>

  <footer class="bg-dark text-white text-center py-3">
    &copy; 2025 E-Shop. All rights reserved.
  </footer>

  <script src="script.js"></script>
</body>
</html>

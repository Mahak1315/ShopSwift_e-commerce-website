<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini E-Commerce</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">E-COMMERCE</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link">Cart <span class="cart-count">(0)</span></a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="d-flex justify-content-between mb-3">
      <div>
        <button class="btn btn-sm btn-outline-primary filter-btn active" onclick="filterProducts('all')">All</button>
        <button class="btn btn-sm btn-outline-primary filter-btn" onclick="filterProducts('Electronics')">Electronics</button>
        <button class="btn btn-sm btn-outline-primary filter-btn" onclick="filterProducts('Clothing')">Clothing</button>
        <button class="btn btn-sm btn-outline-primary filter-btn" onclick="filterProducts('Books')">Books</button>
      </div>
      <select class="form-select w-auto" onchange="sortProducts(this.value)">
        <option selected disabled>Sort by Price</option>
        <option value="asc">Low to High</option>
        <option value="desc">High to Low</option>
      </select>
    </div>

    <div class="row" id="product-list"></div>

    <div class="cart-section mt-4">
      <h5>Shopping Cart</h5>
      <div id="cart-items"></div>
      <div class="mt-3">
        <strong>Total: ₹<span id="cart-total">0</span></strong>
        <button class="btn btn-primary btn-sm float-end">Checkout</button>
      </div>
    </div>
  </div>
    <script src="script.js"></script>
</body>
</html>
